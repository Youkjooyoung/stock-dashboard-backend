# ===== Application =====
spring.application.name=${SPRING_APPLICATION_NAME:stock-dashboard}

# ===== Server =====
server.port=${SERVER_PORT:8443}

# ===== Actuator / Prometheus =====
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:*}
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:when-authorized}
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true

# ===== SSL =====
server.ssl.key-store=${SSL_KEY_STORE:classpath:stock-dashboard.p12}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:}
server.ssl.key-store-type=${SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-alias=${SSL_KEY_ALIAS:stock-dashboard}

# ===== MySQL DB =====
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/stock_dashboard?serverTimezone=Asia/Seoul}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

# ===== MyBatis =====
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# ===== Jackson =====
spring.jackson.time-zone=Asia/Seoul
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSXXX

# ===== Cache =====
spring.cache.type=${SPRING_CACHE_TYPE:simple}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms

# ===== Security =====
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ===== Public API =====
api.data.serviceKey=${DATA_API_SERVICE_KEY:}
api.stock.price.url=${STOCK_PRICE_URL:https://apis.data.go.kr/1160100/service/GetStockSecuritiesInfoService/getStockPriceInfo}
api.stock.item.url=${STOCK_ITEM_URL:https://apis.data.go.kr/1160100/service/GetKrxListedInfoService/getItemInfo}
api.stock.dividend.url=${STOCK_DIVIDEND_URL:https://apis.data.go.kr/1160100/service/GetStockDividendInfoService/getStockDividendInfo}

# ===== Kakao OAuth =====
kakao.client-id=${KAKAO_CLIENT_ID:}
kakao.redirect-uri=${KAKAO_REDIRECT_URI:http://localhost:5173/oauth/kakao}
kakao.client-secret=${KAKAO_CLIENT_SECRET:}

# ===== Naver News API =====
naver.client-id=${NAVER_CLIENT_ID:}
naver.client-secret=${NAVER_CLIENT_SECRET:}
naver.news-url=${NAVER_NEWS_URL:https://openapi.naver.com/v1/search/news.json}

# ===== Google OAuth =====
google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:5173/oauth/google}

# ===== PortOne / Email / App =====
portone.api.key=${PORTONE_API_KEY:}
portone.api.secret=${PORTONE_API_SECRET:}
resend.api.key=${RESEND_API_KEY:}
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.dev}
app.base.url=${APP_BASE_URL:http://localhost:5173}
encrypt.aes.key=${AES_SECRET_KEY:}

# ===== JWT =====
jwt.secret.access=${JWT_SECRET_ACCESS:}
jwt.secret.refresh=${JWT_SECRET_REFRESH:}

# ===== Notification =====
notify.complete.email=${NOTIFY_COMPLETE_EMAIL:}

# ===== OpenAI AI =====
openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-5.4-mini}

# ===== AWS S3 =====
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:}
cloud.aws.s3.bucket=${AWS_S3_BUCKET:}
cloud.aws.region=${AWS_REGION:ap-northeast-2}

# ===== Log =====
logging.level.com.stock.dashboard=${APP_LOG_LEVEL:INFO}
