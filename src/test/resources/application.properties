# Test Configuration

# ===== Server =====
server.port=8443

# ===== SSL =====
server.ssl.key-store=classpath:stock-dashboard.p12
server.ssl.key-store-password=stock1234
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=stock-dashboard

# ===== Database (H2 in-memory for tests) =====
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# ===== MyBatis =====
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# ===== Security off =====
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ===== Public API (dummy values for testing) =====
api.data.serviceKey=test-service-key
api.stock.price.url=https://apis.data.go.kr/1160100/service/GetStockSecuritiesInfoService/getStockPriceInfo
api.stock.item.url=https://apis.data.go.kr/1160100/service/GetKrxListedInfoService/getItemInfo
api.stock.dividend.url=https://apis.data.go.kr/1160100/service/GetStockDividendInfoService/getStockDividendInfo

# ===== Kakao OAuth (dummy values for testing) =====
kakao.client-id=test-kakao-client-id
kakao.redirect-uri=http://localhost:5173/oauth/kakao
kakao.client-secret=test-kakao-secret

# ===== Naver News API (dummy values for testing) =====
naver.client-id=test-naver-client-id
naver.client-secret=test-naver-secret
naver.news-url=https://openapi.naver.com/v1/search/news.json

# ===== Google OAuth (dummy values for testing) =====
google.client-id=test-google-client-id
google.client-secret=test-google-secret
google.redirect-uri=http://localhost:5173/oauth/google

# ===== PortOne (dummy values for testing) =====
portone.api.key=test-portone-key
portone.api.secret=test-portone-secret

# ===== Resend Email (dummy values for testing) =====
resend.api.key=test-resend-key
resend.from.email=test@example.com

# ===== AWS S3 Configuration (dummy values for testing) =====
cloud.aws.credentials.access-key=test-access-key
cloud.aws.credentials.secret-key=test-secret-key
cloud.aws.s3.bucket=test-bucket
cloud.aws.region=ap-northeast-2

# ===== Application =====
app.base.url=http://localhost:5173
encrypt.aes.key=StockDashBoard-AES256-SecretKey!

# ===== JWT =====
jwt.secret.access=test-access-secret-key-test-purpose-only!
jwt.secret.refresh=test-refresh-secret-key-test-purpose-only!

# ===== Notification =====
notify.complete.email=test@example.com

# ===== OpenAI AI (dummy values for testing) =====
openai.api.key=test-openai-api-key
openai.model=gpt-5.4-mini

# ===== Logging =====
logging.level.root=WARN
logging.level.com.stock.dashboard=INFO
logging.level.org.springframework.boot=WARN
logging.level.org.springframework.web=WARN
