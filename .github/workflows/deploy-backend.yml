name: Backend Auto Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2 (api.jyyouk.shop)
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_BACKEND_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            cd ~/stock-dashboard-backend
            echo "[1/4] 최신 코드 pull"
            git fetch origin main
            git reset --hard origin/main
            echo "[2/4] Maven 빌드"
            ./mvnw -B clean package -DskipTests
            echo "[3/4] 서비스 재시작"
            sudo systemctl restart stock-dashboard
            echo "[4/4] 헬스체크 대기"
            sleep 10
            curl -fsS https://api.jyyouk.shop/actuator/health || \
              curl -fsS -k https://localhost:8443/api/stock/prices -o /dev/null && echo "OK"

      - name: Notify success
        if: success()
        run: echo "✅ 백엔드 운영 배포 완료 — $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ 백엔드 운영 배포 실패 — SSH 로그/서비스 상태 확인 필요"
          exit 1
